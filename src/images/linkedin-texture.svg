<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#e8e4df"/>
      <rect x="0" y="0" width="40" height="1" fill="rgba(0,0,0,0.03)"/>
      <rect x="0" y="0" width="1" height="40" fill="rgba(0,0,0,0.02)"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="50%" stop-color="rgba(0,0,0,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="#ddd9d2"/>
  <rect width="800" height="800" fill="url(#grid)"/>
  <rect width="800" height="800" fill="url(#sheen)"/>
  <rect width="800" height="800" fill="rgba(10,102,194,0.04)"/>
</svg>
