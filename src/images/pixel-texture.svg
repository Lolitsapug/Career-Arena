<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Dark base grid pattern -->
  <rect width="32" height="32" fill="#1a1a2e"/>
  <!-- Grid lines -->
  <line x1="0" y1="8" x2="32" y2="8" stroke="#22224a" stroke-width="1"/>
  <line x1="0" y1="16" x2="32" y2="16" stroke="#22224a" stroke-width="1"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#22224a" stroke-width="1"/>
  <line x1="8" y1="0" x2="8" y2="32" stroke="#22224a" stroke-width="1"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#22224a" stroke-width="1"/>
  <line x1="24" y1="0" x2="24" y2="32" stroke="#22224a" stroke-width="1"/>
  <!-- Accent pixels at intersections -->
  <rect x="7" y="7" width="2" height="2" fill="#2a2a5a" opacity="0.5"/>
  <rect x="15" y="15" width="2" height="2" fill="#2a2a5a" opacity="0.5"/>
  <rect x="23" y="23" width="2" height="2" fill="#2a2a5a" opacity="0.4"/>
  <rect x="15" y="7" width="2" height="2" fill="#2a2a5a" opacity="0.3"/>
  <rect x="7" y="23" width="2" height="2" fill="#2a2a5a" opacity="0.3"/>
  <rect x="23" y="7" width="2" height="2" fill="#2a2a5a" opacity="0.35"/>
  <rect x="7" y="15" width="2" height="2" fill="#2a2a5a" opacity="0.35"/>
  <rect x="23" y="15" width="2" height="2" fill="#2a2a5a" opacity="0.45"/>
  <rect x="15" y="23" width="2" height="2" fill="#2a2a5a" opacity="0.4"/>
</svg>